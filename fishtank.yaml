substitutions: #for the name of the fan to input below
  name: fishtank #Specific name 
  friendlyname: Fish Tank
  area: Monis Office
  loglevel: DEBUG
  ip: 10.30.2.50
  sampling_time: 60s


packages:
  base: !include 
    file: packages/common/core/base.yaml
  board: !include   
    file: packages/board/esp8266/d1minisimple.yaml
      
  leak: !include 
    file: packages/sensor/leak.yaml
    vars:
      leak_sensor_pin: D5

# Dallas here instead of a package due to calibration requirements
one_wire:
  - platform: gpio
    pin: D4

sensor:
  - platform: dallas_temp
    address: 0xe33c01f096504828
    name: "${name} Temperature"
    filters:
      - lambda: return x * (9.0/5.0) + 32.0;
      - calibrate_linear:
        - 58.6625 -> 56.3
        - 60.9125 -> 57.9
        - 69.35 -> 64
        - 74.525 -> 67.6
        - 100.0625 -> 96.6
        - 102.65 -> 100.2
        - 125.825 -> 120.9
    unit_of_measurement: "°F"
