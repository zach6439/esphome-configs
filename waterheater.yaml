substitutions:
  name: waterheater
  friendly_name: Water Heater
  area: basement
  loglevel: DEBUG #NONE or DEBUG
  sampling_time: 60s

packages:
  esphome-econet.esphome-econet: github://esphome-econet/esphome-econet/build-yaml/econet-hpwh-esp32s3.yaml@main

esphome:
  name: ${name}
  name_add_mac_suffix: false
  friendly_name: ${friendly_name}

api:
  encryption:
    key: !secret api_enc

wifi: #test
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  manual_ip:
    static_ip: 10.30.2.18
    gateway: 10.30.0.1 #Default Gateway for iotnet
    subnet: 255.255.0.0
