# Dont need this unless i un hard code the address
#     vars:
#       address: 0x77 #Changeme accordingly

# VCC to 3.3V, GND to GND, SDA to D2, and SCL to D1

sensor:
  - platform: bme680
    temperature:
      name: "Temperature"
      oversampling: 16x
    pressure:
      name: "Pressure"
    humidity:
      id: "humidity"
      name: "Humidity"
    gas_resistance:
      id: "gas_resistance"
      name: "Gas Resistance"
    address: 0x77
    update_interval: ${sampling_time}

