# For Basic File
# substitutions: #for the name of the fan to input below
#   name: #hostname (also file name)
#   friendlyname: #Friendly Name
#   area: bedroom #HA Area where it lives
#   loglevel: DEBUG #NONE or DEBUG
#   ip: 10.30.X.X
#   sampling_time: 60s






esphome:
  name: "${name}"

logger: # Enable logging
  level: "${loglevel}"

api: # Enable API with encription
  encryption:
    key: !secret api_enc

ota: #Enables Over the Air Updating of files
  platform: esphome
  password: !secret ota_pass

time:
  - platform: homeassistant
    id: homeassistant_time
    
button: # Restart Button
  - platform: restart
    name: "Restart"
  - platform: safe_mode
    name: "Safe Mode Restart"
    disabled_by_default: true

text_sensor:
  # ESP Version Sensor
  - platform: version
    name: ESPHome Version
    hide_timestamp: true
    disabled_by_default: true

packages:
  wifi: !include /config/esphome/packages/common/network/wifi.yaml
